<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | A-Kart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input { width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: var(--bg-main); color: var(--text-main); }
        .form-row { display: flex; gap: 1rem; }
        .form-row .form-group { flex: 1; }
    </style>
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">A-Kart</a>
            <div class="nav-actions">
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </header>

    <main class="container mt-2 mb-2">
        <h1 style="margin-bottom: 2rem;">Checkout</h1>
        
        <div class="layout-with-sidebar">
            <div class="main-content">
                <form id="checkout-form" style="background: var(--bg-main); padding: 2rem; border: 1px solid var(--border-color); border-radius: var(--radius-md);">
                    <h3 style="margin-bottom: 1rem;">Billing Details</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" required>
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" required>
                    </div>
                    <div class="form-group">
                        <label>Street Address</label>
                        <input type="text" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" id="city" required>
                        </div>
                        <div class="form-group">
                            <label>Zip Code</label>
                            <input type="text" id="zip" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="phone" placeholder="10-digit mobile number" required pattern="[0-9]{10}">
                    </div>

                    <h3 style="margin-top: 2rem; margin-bottom: 1rem;">Payment Method</h3>
                    <div style="padding: 1rem; border: 1px solid var(--primary-color); border-radius: var(--radius-sm); background: var(--bg-secondary); display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
                        <i class="fas fa-shield-alt" style="color: var(--primary-color); font-size: 1.5rem;"></i>
                        <p style="margin: 0; font-size: 0.9rem;">You will be redirected to <strong>PhonePe</strong> secure payment gateway to complete your transaction.</p>
                    </div>

                    <button type="submit" id="place-order-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 1rem; font-size: 1.1rem;">Proceed to Pay</button>
                </form>
            </div>

            <aside class="sidebar">
                <h3 style="margin-bottom: 1.5rem;">Your Order</h3>
                <div id="checkout-items" style="margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
                    <!-- Items injected here -->
                </div>
                <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 1.25rem;">
                    <span>Total</span>
                    <span id="checkout-total" style="color: var(--primary-color);">$0.00</span>
                </div>
            </aside>
        </div>
    </main>

    <script src="assets/js/env.js"></script>
    <script type="module" src="assets/js/main.js"></script>
    <script type="module">
        import cartInstance from './assets/js/cart.js';
        import { showToast } from './assets/js/main.js';
        import { initiatePayment } from './assets/js/payment.js';

        document.addEventListener('DOMContentLoaded', () => {
            const itemsContainer = document.getElementById('checkout-items');
            const totalEl = document.getElementById('checkout-total');
            const checkoutForm = document.getElementById('checkout-form');
            const placeOrderBtn = document.getElementById('place-order-btn');

            if (cartInstance.items.length === 0) {
                itemsContainer.innerHTML = '<p>No items.</p>';
            } else {
                cartInstance.items.forEach(item => {
                    const div = document.createElement('div');
                    div.style.display = 'flex';
                    div.style.justifyContent = 'space-between';
                    div.style.marginBottom = '0.5rem';
                    div.innerHTML = `<span>${item.title.substring(0, 20)}... x${item.quantity}</span><span>$${(item.price * item.quantity).toFixed(2)}</span>`;
                    itemsContainer.appendChild(div);
                });
            }

            const totalAmount = cartInstance.getTotal();
            totalEl.textContent = `$${totalAmount.toFixed(2)}`;

            checkoutForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                if(cartInstance.items.length === 0) {
                    showToast('Your cart is empty!', 'error');
                    return;
                }

                const phone = document.getElementById('phone').value;
                
                try {
                    placeOrderBtn.disabled = true;
                    placeOrderBtn.textContent = 'Processing...';
                    showToast('Initiating payment...');
                    
                    await initiatePayment(totalAmount, phone);
                    
                    // Note: Redirect happens inside initiatePayment
                } catch (error) {
                    showToast(error.message, 'error');
                    placeOrderBtn.disabled = false;
                    placeOrderBtn.textContent = 'Proceed to Pay';
                }
            });
        });
    </script>
</body>
</html>
