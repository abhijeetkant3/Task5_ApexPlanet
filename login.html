<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | A-Kart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 4rem auto;
            background: var(--bg-main);
            padding: 2rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
        }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input { width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: var(--bg-main); color: var(--text-main); }
    </style>
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">A-Kart</a>
            <div class="nav-actions">
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="auth-container">
            <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" required placeholder="••••••••">
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.875rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem;">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" style="color: var(--primary-color);">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem;">
                Don't have an account? <a href="#" style="color: var(--primary-color); font-weight: 500;">Sign up</a>
            </p>
        </div>
    </main>

    <script type="module" src="assets/js/main.js"></script>
    <script type="module">
        import { showToast } from './assets/js/main.js';
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            showToast('Logged in successfully! Redirecting...');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        });
    </script>
</body>
</html>
