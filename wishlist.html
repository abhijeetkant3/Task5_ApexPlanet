<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist | A-Kart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">A-Kart</a>
            <div class="search-container">
                <input type="text" id="search-input" class="search-input" placeholder="Search products...">
                <div id="search-dropdown" class="search-results-dropdown"></div>
            </div>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="products.html">Shop</a>
                <a href="cart.html">Cart</a>
            </nav>
            <div class="nav-actions">
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme"><i class="fas fa-moon"></i></button>
                <a href="wishlist.html" class="icon-btn" aria-label="Wishlist" style="color: var(--primary-color);">
                    <i class="fas fa-heart"></i>
                    <span id="wishlist-badge" class="badge" style="display:none;">0</span>
                </a>
                <a href="cart.html" class="icon-btn" aria-label="Cart">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-badge" class="badge" style="display:none;">0</span>
                </a>
                <a href="login.html" class="icon-btn" aria-label="Profile"><i class="far fa-user"></i></a>
                <button class="icon-btn mobile-menu-btn" aria-label="Menu"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </header>

    <main class="container mt-2 mb-2">
        <h1 style="margin-bottom: 2rem;">My Wishlist</h1>
        
        <div id="wishlist-grid" class="product-grid" style="padding-top: 0;">
            <!-- Injected by wishlist-page.js -->
        </div>
    </main>

    <footer style="margin-top: auto;">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 A-Kart. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Modules -->
    <script type="module" src="assets/js/main.js"></script>
    <script type="module" src="assets/js/search.js"></script>
    <script type="module" src="assets/js/cart.js"></script>
    <script type="module" src="assets/js/wishlist.js"></script>
    <script type="module" src="assets/js/wishlist-page.js"></script>
</body>
</html>
